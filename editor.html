<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Horror Review Editor</title>
<style>
:root {--bg: #030303;--panel: #0a0a0a;--text: #cfcfcf;--accent: #9aff9a;--danger: #ff1a1a;}
body {margin:0;font-family:Arial,sans-serif;color:var(--text);background:radial-gradient(circle at center,#080808 0%,#000 100%);}
.container {max-width:620px;margin:40px auto;padding:25px;background:linear-gradient(145deg,#0a0a0a,#050505);border:1px solid #222;border-radius:12px;}
h1 {text-align:center;}
button,input,textarea,select {padding:8px;margin:6px 0;background:#0b0b0b;border:1px solid #333;color:var(--text);width:100%;}
button {cursor:pointer;background:linear-gradient(145deg,#111,#0a0a0a);}
button:hover {border-color:var(--accent);}
.review {margin:12px 0;padding:12px;background:#111;border:1px solid #333;border-radius:8px;}
</style>
</head>
<body>

<div class="container">
    <h1>Horror Review Editor</h1>
    <button onclick="toggleForm()">+ New Review</button>

    <div id="form" style="display:none;">
        <input id="title" placeholder="Game Title">
        <div id="aspects"></div>
        <button onclick="addReview()">Save Review</button>
        <button onclick="exportJSON()">Download reviews.json</button>
    </div>

    <div id="reviews"></div>
</div>

<script>
const aspectList = ["Gameplay","Story","Sound Design","Characters","Atmosphere"];

function toggleForm(){ 
    const f = document.getElementById("form"); 
    f.style.display = f.style.display === "none" ? "block" : "none"; 
}

function loadAspects(){
    const container = document.getElementById("aspects");
    container.innerHTML = "";
    aspectList.forEach(a => {
        container.innerHTML += `
        <div style="margin:12px 0;">
            <strong>${a}</strong><br>
            <select id="${a}"><option>S</option><option>A</option><option>B</option><option>C</option><option>D</option></select>
            <textarea id="${a}-text" placeholder="Comment..."></textarea>
        </div>`;
    });
}

function addReview(){
    const title = document.getElementById("title").value.trim();
    if(!title) return alert("Title required");
    let data = {title, aspects:{}};
    aspectList.forEach(a => {
        data.aspects[a] = {
            tier: document.getElementById(a).value,
            text: document.getElementById(a+"-text").value.trim()
        };
    });
    let reviews = JSON.parse(localStorage.getItem("reviews") || "[]");
    reviews.push(data);
    localStorage.setItem("reviews", JSON.stringify(reviews));
    renderReviews();
}

function renderReviews(){
    const container = document.getElementById("reviews");
    container.innerHTML = "<h2>Saved Reviews</h2>";
    let reviews = JSON.parse(localStorage.getItem("reviews") || "[]");
    reviews.forEach((r,i) => {
        let html = "";
        for(let a in r.aspects) html += `<div><strong>${a}:</strong> ${r.aspects[a].tier} - ${r.aspects[a].text}</div>`;
        container.innerHTML += `<div class="review"><strong>${r.title}</strong> <button onclick="deleteReview(${i})" style="float:right;">Delete</button><div>${html}</div></div>`;
    });
}

function deleteReview(i){
    if(confirm("Delete?")) {
        let reviews = JSON.parse(localStorage.getItem("reviews") || "[]");
        reviews.splice(i,1);
        localStorage.setItem("reviews", JSON.stringify(reviews));
        renderReviews();
    }
}

function exportJSON(){
    let reviews = JSON.parse(localStorage.getItem("reviews") || "[]");
    const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(reviews, null, 2));
    const link = document.createElement('a');
    link.href = dataUri;
    link.download = 'reviews.json';
    link.click();
}

loadAspects();
renderReviews();
</script>
</body>
</html>
