<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tierlist Admin Panel</title>
<!-- Include Supabase Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --bg: #030303;
    --panel: #0a0a0a;
    --text: #cfcfcf;
    --accent: #9aff9a;
    --danger: #ff1a1a;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: var(--text);
    background: radial-gradient(circle at center, #080808 0%, #000 100%);
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.9));
    pointer-events: none;
}

.container {
    max-width: 620px;
    margin: 40px auto;
    padding: 25px;
    background: linear-gradient(145deg, #0a0a0a, #050505);
    border: 1px solid #222;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0,0,0,0.9);
    position: relative;
    z-index: 1;
}

h1, h3 {
    letter-spacing: 2px;
    color: #e0e0e0;
}

button {
    padding: 8px 14px;
    margin: 6px 4px;
    background: linear-gradient(145deg, #111, #0a0a0a);
    border: 1px solid #333;
    color: var(--text);
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    color: var(--danger);
    border-color: var(--danger);
}

input, textarea, select {
    width: 100%;
    padding: 8px;
    margin: 6px 0;
    background: #0b0b0b;
    border: 1px solid #222;
    color: var(--text);
    box-sizing: border-box;
}

input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
}

textarea {
    height: 50px;
    resize: none;
}

.review-item {
    margin-top: 12px;
    padding: 12px;
    border-radius: 8px;
    background: #050505;
    border: 1px solid #222;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>
</head>

<body>

<div class="container">
    <h1>Tierlist Admin Management</h1>
    
    <label>Admin Password:</label>
    <input type="password" id="adminPassword" placeholder="Enter password to make changes">
    <hr style="border-color:#222; margin: 20px 0;">
    
    <h3>Add New Review</h3>
    <input id="title" placeholder="Game Title">
    
    <label style="margin-top: 6px; display: block;">Game Category / Genre:</label>
    <select id="genre">
        <option value="action">⚔️ Action / RPG</option>
        <option value="fps">🎯 FPS / Shooter</option>
        <option value="strategy">🧠 Strategy / Sim</option>
        <option value="horror">🎃 Horror Games</option>
        <option value="sports">⚽ Sports Games</option>
        <option value="cozy">☕ Cozy Games</option>
        <option value="indie">💎 Indie Gems</option>
    </select>
    
    <div id="aspects" style="margin-top: 15px;"></div>
    <button onclick="addReview()">Save Review to Cloud</button>
    
    <hr style="border-color:#222; margin: 20px 0;">
    <h3>Current Live Reviews</h3>
    <div id="reviews"></div>
</div>

<script>
// Initialize Supabase connection using your project credentials
const supabaseUrl = 'https://suahnxysnelbhdkogpro.supabase.co';
const supabaseKey = 'sb_publishable_tVlPbeAMSMnxG36oFU7ZJw_R4XOwAJZ';
const SECRET_PASSWORD = 'Nalle2017jjv'; // Change this to your password!
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

const aspectList = ["Gameplay","Story","Sound Design","Characters","Atmosphere"];

function loadAspects(){
    const container = document.getElementById("aspects");
    container.innerHTML = "";
    aspectList.forEach(a=>{
        container.innerHTML += `
        <div style="margin-bottom:12px;">
            <strong>${a}</strong>
            <select id="${a}">
                <option>S</option>
                <option>A</option>
                <option>B</option>
                <option>C</option>
                <option>D</option>
            </select>
            <textarea id="${a}-text" placeholder="Comment for ${a}..."></textarea>
        </div>`;
    });
}

function checkAuth() {
    const enteredPassword = document.getElementById("adminPassword").value;
    if (enteredPassword !== SECRET_PASSWORD) {
        alert("Invalid Admin Password!");
        return false;
    }
    return true;
}

async function addReview(){
    if(!checkAuth()) return;
    
    const title = document.getElementById("title").value;
    const genre = document.getElementById("genre").value;
    
    if(!title) return alert("Please enter a game title");

    let aspectsData = {};
    aspectList.forEach(a=>{
        aspectsData[a] = {
            tier: document.getElementById(a).value,
            text: document.getElementById(a+"-text").value
        };
    });

    // Added the 'genre' field to the row record inserted into the database table
    const { error } = await _supabase
        .from('reviews')
        .insert([{ title, genre, aspects: aspectsData }]);

    if(error) {
        alert("Error saving: " + error.message);
    } else {
        document.getElementById("title").value = "";
        document.getElementById("genre").selectedIndex = 0;
        loadAspects();
        renderReviews();
    }
}

async function deleteReview(id){
    if(!checkAuth()) return;
    if(!confirm("Are you sure you want to delete this review permanently?")) return;

    const { error } = await _supabase
        .from('reviews')
        .delete()
        .eq('id', id);

    if(error) alert("Error deleting review");
    else renderReviews();
}

async function renderReviews(){
    const container = document.getElementById("reviews");
    
    let { data: reviews } = await _supabase
        .from('reviews')
        .select('*')
        .order('created_at', { ascending: false });
    
    container.innerHTML = "";
    if(!reviews || reviews.length === 0) {
        container.innerHTML = "<p style='color:#666;'>No live reviews found.</p>";
        return;
    }

    reviews.forEach(r => {
        // Display both title and genre mapping inside the admin list panel
        const displayGenre = r.genre ? r.genre.toUpperCase() : "UNASSIGNED";
        container.innerHTML += `
        <div class="review-item">
            <span><strong>${r.title}</strong> <small style="color:#666; margin-left:8px;">[${displayGenre}]</small></span>
            <button onclick="deleteReview(${r.id})" style="background:#200; border-color:#400;">Delete</button>
        </div>`;
    });
}

loadAspects();
renderReviews();
</script>

</body>
</html>
