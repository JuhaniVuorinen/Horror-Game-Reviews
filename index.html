<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Review Tierlist</title>
<!-- Include Supabase Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --bg: #020408;
    --panel: #070d19;
    --text: #cfcfcf;
    --accent: #00d2ff;
    --glow: #0055ff;
}

/* 🌑 BACKGROUND */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: var(--text);
    background: radial-gradient(circle at center, #050b14 0%, #010307 100%);
    overflow-x: hidden;
}

/* 📺 VIGNETTE */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.9));
    pointer-events: none;
}

/* 📺 NOISE */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    opacity: 0.05;
    pointer-events: none;
    background-image: url("https://grainy-gradients.vercel.app/noise.svg");
}

/* 📦 MAIN CONTAINER */
.container {
    max-width: 620px;
    margin: 60px auto;
    padding: 25px;
    background: linear-gradient(145deg, var(--panel), #03060c);
    border: 1px solid #112244;
    border-radius: 12px;
    box-shadow:
        0 0 40px rgba(0,0,0,0.9),
        inset 0 0 30px rgba(0,0,0,0.9),
        0 0 15px rgba(0, 85, 255, 0.1);
}

/* 🧠 TITLE */
h1 {
    text-align: center;
    letter-spacing: 2px;
    color: #ffffff;
    text-transform: uppercase;
    text-shadow:
        0 0 8px rgba(0, 210, 255, 0.5),
        0 0 20px rgba(0, 85, 255, 0.3);
}

/* 📂 GENRE SECTIONS */
.genre-section {
    margin-top: 30px;
}

.genre-title {
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--accent);
    border-bottom: 1px solid #112244;
    padding-bottom: 5px;
    margin-bottom: 15px;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(0, 210, 255, 0.4);
}

/* 📂 REVIEW CARD */
.review {
    margin-top: 12px;
    padding: 14px;
    border-radius: 8px;
    background: linear-gradient(145deg, #050a12, #020408);
    border: 1px solid #101c33;
    box-shadow:
        inset 0 0 15px rgba(0,0,0,0.8),
        0 0 8px rgba(0,0,0,0.6);
}

/* 🔽 HEADER */
.review-header {
    display: flex;
    justify-content: space-between;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 0.5px;
}

/* 📄 CONTENT */
.review-content {
    display: none;
    margin-top: 15px;
    padding-top: 10px;
    border-top: 1px dashed #112244;
}

/* ⚡ HOVER GLOW CARD */
.review:hover {
    border-color: var(--accent);
    box-shadow:
        0 0 15px rgba(0, 210, 255, 0.2),
        inset 0 0 15px rgba(0,0,0,0.9);
}

.no-reviews {
    text-align: center;
    color: #4f688f;
    font-style: italic;
    padding: 10px 0;
}
</style>
</head>

<body>

<div class="container">
    <h1>Game Review Tierlists</h1>
    
    <!-- Genre Container Sections -->
    <div class="genre-section">
        <div class="genre-title">🎃 Horror Games</div>
        <div id="genre-horror"><p class="no-reviews">Loading...</p></div>
    </div>

    <div class="genre-section">
        <div class="genre-title">⚽ Sports Games</div>
        <div id="genre-sports"><p class="no-reviews">Loading...</p></div>
    </div>

    <div class="genre-section">
        <div class="genre-title">☕ Cozy Games</div>
        <div id="genre-cozy"><p class="no-reviews">Loading...</p></div>
    </div>
</div>

<script>
// Initialize Supabase connection
const supabaseUrl = 'https://suahnxysnelbhdkogpro.supabase.co';
const supabaseKey = 'sb_publishable_tVlPbeAMSMnxG36oFU7ZJw_R4XOwAJZ';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

function toggleReview(id){
    const el = document.getElementById("review-"+id);
    el.style.display = el.style.display === "block" ? "none" : "block";
}

async function renderReviews(){
    const sections = {
        horror: document.getElementById("genre-horror"),
        sports: document.getElementById("genre-sports"),
        cozy: document.getElementById("genre-cozy")
    };

    // Clear loading text
    for (let key in sections) {
        sections[key].innerHTML = "";
    }

    // Pull raw data directly from the cloud database
    let { data: reviews, error } = await _supabase
        .from('reviews')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) {
        for (let key in sections) {
            sections[key].innerHTML = "Error loading reviews.";
        }
        return;
    }

    let counts = { horror: 0, sports: 0, cozy: 0 };

    if (reviews && reviews.length > 0) {
        reviews.forEach((r)=>{
            // Determine the target genre container (defaults to horror if it doesn't match/exist yet)
            let genre = (r.genre || 'horror').toLowerCase();
            if (!sections[genre]) genre = 'horror'; 

            let aspectsHTML = "";
            for(let a in r.aspects){
                aspectsHTML += `
                <div style="margin-bottom: 8px;">
                    <strong style="color: var(--accent);">${a}:</strong> ${r.aspects[a].tier}<br>
                    <small style="color:#aaa;">${r.aspects[a].text || ''}</small>
                </div>`;
            }

            sections[genre].innerHTML += `
            <div class="review">
                <div class="review-header" onclick="toggleReview(${r.id})">
                    <span>${r.title}</span>
                </div>
                <div class="review-content" id="review-${r.id}">
                    ${aspectsHTML}
                </div>
            </div>`;
            
            counts[genre]++;
        });
    }

    // If any section remains empty, print empty state message
    for (let key in sections) {
        if (counts[key] === 0) {
            sections[key].innerHTML = "<p class='no-reviews'>No reviews posted in this section yet!</p>";
        }
    }
}

renderReviews();
</script>

</body>
</html>
