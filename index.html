<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Horror Review Tierlist</title>
<!-- Include Supabase Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --bg: #030303;
    --panel: #0a0a0a;
    --text: #cfcfcf;
    --accent: #9aff9a;
    --danger: #ff1a1a;
}

/* 🌑 BACKGROUND */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: var(--text);
    background: radial-gradient(circle at center, #080808 0%, #000 100%);
    overflow-x: hidden;
}

/* 📺 VIGNETTE */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.9));
    pointer-events: none;
}

/* 📺 NOISE */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    opacity: 0.08;
    pointer-events: none;
    background-image: url("https://grainy-gradients.vercel.app/noise.svg");
}

/* 🎃 SIDE */
.side {
    position: fixed;
    top: 0;
    width: 100px;
    height: 100%;
    pointer-events: none;
}

.left { left: 0; }
.right { right: 0; }

.pumpkin {
    display: block;
    font-size: 42px;
    margin: 50px auto;
    filter: drop-shadow(0 0 10px orange);
    animation: float 4s ease-in-out infinite alternate;
}

@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(15px); }
}

/* 📦 PANEL */
.container {
    max-width: 620px;
    margin: 60px auto;
    padding: 25px;
    background: linear-gradient(145deg, #0a0a0a, #050505);
    border: 1px solid #222;
    border-radius: 12px;

    box-shadow:
        0 0 40px rgba(0,0,0,0.9),
        inset 0 0 30px rgba(0,0,0,0.9),
        0 0 10px rgba(154,255,154,0.05);
}

/* 🧠 TITLE */
h1 {
    text-align: center;
    letter-spacing: 2px;
    color: #e0e0e0;

    text-shadow:
        0 0 8px rgba(154,255,154,0.3),
        0 0 20px rgba(154,255,154,0.1);
}

/* 📂 REVIEW CARD */
.review {
    margin-top: 12px;
    padding: 12px;
    border-radius: 8px;
    background: linear-gradient(145deg, #0a0a0a, #050505);
    border: 1px solid #222;

    box-shadow:
        inset 0 0 15px rgba(0,0,0,0.9),
        0 0 8px rgba(0,0,0,0.6);
}

/* 🔽 HEADER */
.review-header {
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

/* 📄 CONTENT */
.review-content {
    display: none;
    margin-top: 10px;
}

/* 📊 ASPECT */
.aspect {
    margin-bottom: 10px;
}

/* ⚡ HOVER GLOW CARD */
.review:hover {
    border-color: #333;
    box-shadow:
        0 0 15px rgba(154,255,154,0.1),
        inset 0 0 15px rgba(0,0,0,0.9);
}
</style>
</head>

<body>

<!-- 🎃 SIDES -->
<div class="side left">
    <span class="pumpkin">🎃</span>
    <span class="pumpkin">🎃</span>
    <span class="pumpkin">🎃</span>
</div>

<div class="side right">
    <span class="pumpkin">🎃</span>
    <span class="pumpkin">🎃</span>
    <span class="pumpkin">🎃</span>
</div>

<div class="container">
    <h1>Horror Review Tierlist</h1>
    <!-- The Add Form buttons have been removed for viewers -->
    <div id="reviews">Loading reviews...</div>
</div>

<script>
// Initialize Supabase connection
const supabaseUrl = 'https://suahnxysnelbhdkogpro.supabase.co';
const supabaseKey = 'sb_publishable_tVlPbeAMSMnxG36oFU7ZJw_R4XOwAJZ';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

function toggleReview(id){
    const el = document.getElementById("review-"+id);
    el.style.display = el.style.display === "block" ? "none" : "block";
}

async function renderReviews(){
    const container = document.getElementById("reviews");
    container.innerHTML = "";

    // Pull raw data directly from the cloud database
    let { data: reviews, error } = await _supabase
        .from('reviews')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) {
        container.innerHTML = "Error loading reviews.";
        return;
    }

    if (!reviews || reviews.length === 0) {
        container.innerHTML = "<p style='text-align:center; color:#666;'>No reviews posted yet!</p>";
        return;
    }

    reviews.forEach((r)=>{
        let aspectsHTML = "";

        for(let a in r.aspects){
            aspectsHTML += `
            <div style="margin-bottom: 8px;">
                <strong>${a}:</strong> ${r.aspects[a].tier}<br>
                <small style="color:#aaa;">${r.aspects[a].text || ''}</small>
            </div>`;
        }

        container.innerHTML += `
        <div class="review">
            <div class="review-header" onclick="toggleReview(${r.id})">
                <span>${r.title}</span>
            </div>
            <div class="review-content" id="review-${r.id}">
                ${aspectsHTML}
            </div>
        </div>`;
    });
}

renderReviews();
</script>

</body>
</html>
